name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-go:
    name: Build Go (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            suffix: linux-amd64
            ext: ""
          - os: macos-latest
            label: macos
            suffix: macos-amd64
            ext: ""
          - os: windows-latest
            label: windows
            suffix: windows-amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build Go binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          GO_OUT="dist/s3-lfs-go-${{ matrix.suffix }}${{ matrix.ext }}"

          if [ -d "./packages/cli/cmd/s3-lfs" ]; then
            GO_ENTRY="./packages/cli/cmd/s3-lfs"
          elif [ -d "./packages/cli/cmd/lfs-s3" ]; then
            GO_ENTRY="./packages/cli/cmd/lfs-s3"
          elif [ -d "./cmd/s3-lfs" ]; then
            GO_ENTRY="./cmd/s3-lfs"
          elif [ -d "./cmd/lfs-s3" ]; then
            GO_ENTRY="./cmd/lfs-s3"
          else
            echo "Could not find Go CLI entrypoint."
            echo "Checked: ./packages/cli/cmd/s3-lfs ./packages/cli/cmd/lfs-s3 ./cmd/s3-lfs ./cmd/lfs-s3"
            exit 1
          fi

          echo "Building Go entrypoint: ${GO_ENTRY}"
          go build -trimpath -ldflags "-s -w" -o "${GO_OUT}" "${GO_ENTRY}"

      - name: Upload Go artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-go-${{ matrix.suffix }}
          path: dist/*
          if-no-files-found: error

  build-rust:
    name: Build Rust (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            suffix: linux-amd64
            ext: ""
          - os: macos-latest
            label: macos
            suffix: macos-amd64
            ext: ""
          - os: windows-latest
            label: windows
            suffix: windows-amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          RUST_OUT="dist/s3-lfs-rs-${{ matrix.suffix }}${{ matrix.ext }}"
          cargo build --release --manifest-path ./packages/cli-rs/Cargo.toml
          cp "./packages/cli-rs/target/release/s3-lfs${{ matrix.ext }}" "${RUST_OUT}"

      - name: Upload Rust artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-rs-${{ matrix.suffix }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-go, build-rust]
    if: always() && startsWith(github.ref, 'refs/tags/') && (needs.build-go.result == 'success' || needs.build-rust.result == 'success')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: release-assets

      - name: Publish release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
