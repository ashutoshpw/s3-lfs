name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            suffix: linux-amd64
            ext: ""
          - os: macos-13
            label: macos
            suffix: macos-amd64
            ext: ""
          - os: windows-latest
            label: windows
            suffix: windows-amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Go and Rust binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          GO_OUT="dist/s3-lfs-go-${{ matrix.suffix }}${{ matrix.ext }}"
          RUST_OUT="dist/s3-lfs-rs-${{ matrix.suffix }}${{ matrix.ext }}"

          go build -trimpath -ldflags "-s -w" -o "${GO_OUT}" ./packages/cli/cmd/s3-lfs
          cargo build --release --manifest-path ./packages/cli-rs/Cargo.toml
          cp "./packages/cli-rs/target/release/s3-lfs${{ matrix.ext }}" "${RUST_OUT}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: release-assets

      - name: Publish release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
