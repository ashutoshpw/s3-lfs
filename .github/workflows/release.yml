name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-go:
    name: Build Go (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
          - os: ubuntu-latest
            suffix: linux-arm64
            goos: linux
            goarch: arm64
            ext: ""
          - os: macos-latest
            suffix: macos-amd64
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            suffix: macos-arm64
            goos: darwin
            goarch: arm64
            ext: ""
          - os: windows-latest
            suffix: windows-amd64
            goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build Go binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          GO_OUT="dist/s3-lfs-go-${{ matrix.suffix }}${{ matrix.ext }}"

          if [ -d "./packages/cli/cmd/s3-lfs" ]; then
            GO_ENTRY="./packages/cli/cmd/s3-lfs"
          elif [ -d "./packages/cli/cmd/lfs-s3" ]; then
            GO_ENTRY="./packages/cli/cmd/lfs-s3"
          elif [ -d "./cmd/s3-lfs" ]; then
            GO_ENTRY="./cmd/s3-lfs"
          elif [ -d "./cmd/lfs-s3" ]; then
            GO_ENTRY="./cmd/lfs-s3"
          else
            echo "Could not find Go CLI entrypoint."
            echo "Checked: ./packages/cli/cmd/s3-lfs ./packages/cli/cmd/lfs-s3 ./cmd/s3-lfs ./cmd/lfs-s3"
            exit 1
          fi

          echo "Building Go entrypoint: ${GO_ENTRY}"
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w" -o "${GO_OUT}" "${GO_ENTRY}"

      - name: Upload Go artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-go-${{ matrix.suffix }}
          path: dist/*
          if-no-files-found: error

  build-rust:
    name: Build Rust (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-amd64
            rust_target: x86_64-unknown-linux-gnu
            ext: ""
          - os: ubuntu-latest
            suffix: linux-arm64
            rust_target: aarch64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            suffix: macos-amd64
            rust_target: x86_64-apple-darwin
            ext: ""
          - os: macos-latest
            suffix: macos-arm64
            rust_target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            suffix: windows-amd64
            rust_target: x86_64-pc-windows-msvc
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Install Linux arm64 linker
        if: matrix.rust_target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build Rust binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          RUST_OUT="dist/s3-lfs-rs-${{ matrix.suffix }}${{ matrix.ext }}"
          if [ "${{ matrix.rust_target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi

          cargo build --release --target "${{ matrix.rust_target }}" --manifest-path ./packages/cli-rs/Cargo.toml
          cp "./packages/cli-rs/target/${{ matrix.rust_target }}/release/s3-lfs${{ matrix.ext }}" "${RUST_OUT}"

      - name: Upload Rust artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-rs-${{ matrix.suffix }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-go, build-rust]
    if: always() && startsWith(github.ref, 'refs/tags/') && (needs.build-go.result == 'success' || needs.build-rust.result == 'success')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: release-assets

      - name: Publish release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
